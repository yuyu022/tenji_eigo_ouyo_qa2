// Safari でも動くように、ユーザー操作（ボタン押下）後に voice を選ぶのが安定
function getJapaneseVoice() {
  const voices = window.speechSynthesis?.getVoices?.() || [];
  // できるだけ ja-JP を優先
  return voices.find(v => (v.lang || "").toLowerCase().startsWith("ja")) || null;
}

function getEnglishVoice() {
  const voices = window.speechSynthesis?.getVoices?.() || [];
  return voices.find(v => (v.lang || "").toLowerCase().startsWith("en")) || null;
}

/**
 * テキスト読み上げ（Promise化）
 * - iOS Safari/Chrome 共通で speechSynthesis を使用
 * - 連続読み上げ用に await で待てるようにしています
 */
function speak(text, opts = {}) {
  return new Promise((resolve) => {
    if (!("speechSynthesis" in window)) {
      resolve();
      return;
    }

    // 前の発話が残っている場合は停止
    window.speechSynthesis.cancel();

    const uttr = new SpeechSynthesisUtterance(text);

    // ★言語を選べるように（デフォルトは日本語）
    const lang = opts.lang || SPEECH.ja.lang;
    uttr.lang = lang;

    // ★速度なども言語ごとに切替
    const conf = (lang.toLowerCase().startsWith("en")) ? SPEECH.en : SPEECH.ja;
    uttr.rate = conf.rate;
    uttr.pitch = conf.pitch;
    uttr.volume = conf.volume;

    // ★voice も言語で切替
    const voice = (lang.toLowerCase().startsWith("en")) ? getEnglishVoice() : getJapaneseVoice();
    if (voice) uttr.voice = voice;

    uttr.onend = () => resolve();
    uttr.onerror = () => resolve();

    window.speechSynthesis.speak(uttr);
  });
}

/** 待機 */
function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

/**
 * 答え（word）を日本語で読み上げ用に整形
 * - item.ja があればそれを使う
 * - 無ければアルファベットを1文字ずつ日本語読み（エー、ビー…）にする
 */
function toJapaneseReading(item) {
  const ja = (item?.ja || "").trim();
  return ja || null; // ★無ければ null
}
/**
 * dots を「ひとますめが 1,2,3 の点…」形式に変換
 * - dots は [[...],[...],...] の配列（マスごと）
 */
function dotsToQuestionText(dots) {
  const cellCount = dots.length;

  // 1～10程度のマス数なら日本語の序数を用意
  const ord = ["","ひと","ふた","み","よ","いつ","む","なな","や","ここの","とお"];
  const cellPrefix = (n) => (ord[n] ? ord[n] + "ますめ" : (n + "ますめ"));

  const cellCountText = (cellCount === 1) ? "ひとます" : (cellCount + "マス");

  const cells = dots.map((cellDots, idx) => {
    // 点番号を「いち,に,さん…」に
    const jpNum = (n) => {
      const map = {1:"いち",2:"に",3:"さん",4:"よん",5:"ご",6:"ろく"};
      return map[n] || String(n);
    };
    const dotsText = (cellDots || []).map(jpNum).join("、");
    if (cellCount === 1) {
      return `ひとますめが${dotsText}の点`;
    }
    return `${cellPrefix(idx+1)}が${dotsText}の点`;
  });

  // 例：「にマスの点字で、ひとますめが…、ふたますめが…はなんですか？」
  return `${cellCountText}の点字で、${cells.join("、")}はなんですか？`;
}

/**
 * 配列をシャッフル（重複なしのランダム順）
 */
function shuffledCopy(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/** ボタン描画 */
function renderButtons() {
  const root = document.getElementById("buttons");
  root.innerHTML = "";

  QUIZ_SETS.forEach(set => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.id = set.id;
    btn.textContent = set.name;
    btn.setAttribute("aria-label", set.name);
    btn.dataset.selected = "false";

    btn.addEventListener("click", () => onButtonClick(set.id));
    root.appendChild(btn);
  });
}

/**
 * ボタンクリック挙動（要件通り）
 * - 1回目：選択状態にして「<ボタン名> を、起動しますか？」
 * - 同じボタンをもう1回：問題読み上げ開始
 * - 別ボタン： 「選択を解除しました」＋選択解除
 */
async function onButtonClick(setId) {
  // ★読み上げ中でも「出題中の同一ボタン停止」は受け付ける
  if (isSpeaking && !(isRunningQuiz && selectedSetId === setId)) return;

  const set = QUIZ_SETS.find(s => s.id === setId);
  if (!set) return;

  // 別ボタンが押された場合：選択解除
  if (selectedSetId && selectedSetId !== setId) {
    currentRunToken++;              // 出題中なら中断
    isRunningQuiz = false;          // ★出題中フラグ解除
    selectedSetId = null;
    updateSelectedUI(null);
    isSpeaking = true;
    await speak("選択を解除しました");
    isSpeaking = false;
    return;
  }

  // 未選択 → 選択状態へ（確認メッセージ）
  if (!selectedSetId) {
    selectedSetId = setId;
    updateSelectedUI(setId);
    isSpeaking = true;
    await speak(`${set.name} を、起動しますか？`);
    isSpeaking = false;
    return;
  }

  // 同じボタンが2回目 → 出題開始
  // 同じボタン
  if (selectedSetId === setId) {

    // ★出題中なら「停止」
    if (isRunningQuiz) {
      currentRunToken++; // runQuiz の中断チェックを効かせる
      if ("speechSynthesis" in window) {
        window.speechSynthesis.cancel(); // いま喋っている音声も止める
      }
      isSpeaking = true;
      await speak("問題を停止します。");
      isSpeaking = false;

      isRunningQuiz = false; // 出題中フラグ解除
      return;
    }

    // ★出題中でなければ「出題開始」
    currentRunToken++;
    const token = currentRunToken;

    isRunningQuiz = true;
    isSpeaking = true;
    await runQuiz(set, token);
    isSpeaking = false;
    // runQuiz が最後まで終わったら（中断含む）フラグを戻す
    isRunningQuiz = false;
  }

}

/** 選択UI更新 */
function updateSelectedUI(selectedId) {
  QUIZ_SETS.forEach(s => {
    const el = document.getElementById(s.id);
    if (!el) return;
    el.dataset.selected = (s.id === selectedId) ? "true" : "false";
  });
}

/**
 * 出題ロジック（要件通り）
 * 1) 「問題数はN問です。問題を開始します。」
 * 2) 各問題：
 *    - 質問読み上げ
 *    - 3秒待機
 *    - 「答えは、"word"です」
 *    - 1秒待機
 * ※ 毎回ランダム順・重複なし
 */
async function runQuiz(set, token) {
  const questions = shuffledCopy(set.items);
  const total = questions.length;

  // 開始アナウンス
  await speak(`問題すうは${total}問です。問題を開始します。`);
  if (token !== currentRunToken) return; // 中断チェック

  for (let i = 0; i < total; i++) {
    const q = questions[i];
    const qText = dotsToQuestionText(q.dots);

    // 質問
    await speak(qText);
    if (token !== currentRunToken) return;

    // 3秒待機
    await sleep(DELAY.beforeAnswerMs);
    if (token !== currentRunToken) return;


    const ja = toJapaneseReading(q);
    if (ja) {
      // 日本語読みが用意されているものは、日本語で自然に
      await speak(`答えは、${ja}、です`, { lang: "ja-JP" });
    } else {
      // ★ja が無い場合：
    // 1)「答えは、」日本語
      await speak("答えは、", { lang: "ja-JP" });

      // 2) 単語だけ英語（自然な英語読み）
      await speak(String(q.word || ""), { lang: "en-US" });

      // 3)「です」日本語
      await speak("、です。", { lang: "ja-JP" });
    }

    if (token !== currentRunToken) return;

    // 1秒待機
    await sleep(DELAY.afterAnswerMs);
    if (token !== currentRunToken) return;
  }
  // 終了アナウンス
  await speak(`${total}問の問題を解き終わりましたので終了します。`);

}
